<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Niña 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
/* ===== FONDO COMPLETO SIN FRANJAS ===== */

html, body{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Quicksand', sans-serif;
    background:url("https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1974&auto=format&fit=crop") center/cover no-repeat fixed;
    background-size:cover;
    overflow-x:hidden;
}

/* Capa suavizado floral */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(3px);
    z-index:-1;
}

.container{
    max-width:1000px;
    margin:0 auto;
    padding:80px 20px 120px 20px;
    text-align:center;
}

/* ===== TEXTOS ===== */

h1{
    font-family:'Great Vibes', cursive;
    font-size:58px;
    color:#111111;
    margin-bottom:15px;
}

.intro{
    font-size:20px;
    color:#111111;
}

.contador{
    margin-top:15px;
    font-size:18px;
    color:#111111;
}

.frase{
    max-width:650px;
    margin:0 auto;
    font-size:18px;
    line-height:1.8;
    color:#111111;
}

.mensaje-extra{
    margin-top:25px;
    font-weight:600;
    font-size:18px;
    color:#111111;
}

/* ===== CARRUSEL PERFECTAMENTE AJUSTADO ===== */

.carrusel-container{
    margin:100px 0 100px 0;
    display:flex;
    justify-content:center;
    perspective:1600px;
}

.carrusel{
    position:relative;
    width:260px;
    height:330px;
    transform-style:preserve-3d;
    animation:rotar 40s linear infinite;
}

.carrusel img{
    position:absolute;
    width:200px;
    height:280px;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
    left:50%;
    top:50%;
    transform-origin:center center;
}

@keyframes rotar{
    from{ transform:rotateY(0deg); }
    to{ transform:rotateY(360deg); }
}

/* ===== ELEMENTOS FLOTANTES ===== */

.flotando{
    position:fixed;
    bottom:-50px;
    font-size:18px;
    animation:subir 15s linear infinite;
    opacity:0.85;
    pointer-events:none;
}

@keyframes subir{
    from{transform:translateY(0);}
    to{transform:translateY(-120vh);}
}

#botonMusica{
    margin-top:40px;
    padding:12px 30px;
    border-radius:25px;
    border:none;
    background:#a7d7a7;
    color:#111111;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

#botonMusica:hover{
    background:#8ecf8e;
}
</style>
</head>

<body>

<div class="container">

<h1>Feliz Día de la Mujer, Mi Niña 🤍</h1>

<div class="intro">Eres calma, eres luz, eres vida.</div>

<div class="contador" id="contador"></div>

<div class="carrusel-container">
    <div class="carrusel" id="carrusel"></div>
</div>

<div class="frase">
Desde el 9 de marzo de 2024 mi corazón aprendió una nueva forma de amar.
Contigo todo se siente más libre, más bonito, más verdadero.
</div>

<div class="mensaje-extra">
Hoy celebro tu esencia, tu fuerza tranquila y la mujer increíble que eres 🤍
</div>

<button id="botonMusica">🌿 Activar música</button>

</div>

<audio id="musica" loop>
<source src="no hay problema.mp3" type="audio/mpeg">
</audio>

<script>

const imagenes = [
"30.jpeg",
"33.jpeg",
"35.jpeg",
"42.jpeg",
"44.jpeg",
"45.jpeg",
"49.jpeg",
"50.jpeg",
"54.jpeg",
"55.jpeg"
];

const carrusel = document.getElementById("carrusel");
const cantidad = imagenes.length;
const angulo = 360 / cantidad;

const ancho = 200;
const radio = (ancho / 2) / Math.tan(Math.PI / cantidad) + 5;

imagenes.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;

    img.style.transform = `
        translate(-50%, -50%)
        rotateY(${i * angulo}deg)
        translateZ(${radio}px)
    `;

    carrusel.appendChild(img);
});

const fechaInicio = new Date(2024, 2, 9);

function actualizarContador(){
    const ahora = new Date();
    const diferencia = ahora - fechaInicio;
    const dias = Math.floor(diferencia / (1000*60*60*24));
    document.getElementById("contador").innerHTML =
    "Han pasado " + dias + " días desde que comenzó nuestra historia 🤍";
}
actualizarContador();
setInterval(actualizarContador,1000);

const musica = document.getElementById("musica");
musica.volume = 0.3;

document.getElementById("botonMusica").addEventListener("click", function(){
    musica.play();
    this.style.display="none";
});

function crearElemento(){
    const elemento=document.createElement("div");
    elemento.classList.add("flotando");

    const simbolos=["🌸","🌿","🤍","🍃"];
    elemento.innerHTML=simbolos[Math.floor(Math.random()*simbolos.length)];

    elemento.style.left=Math.random()*100+"vw";

    document.body.appendChild(elemento);
    setTimeout(()=>{elemento.remove();},15000);
}
setInterval(crearElemento,1300);

</script>

</body>
</html>
