<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Niña 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family:'Quicksand', sans-serif;
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
    display:flex;
    justify-content:center;
}

/* FONDO COMPLETO */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1974&auto=format&fit=crop") center/cover no-repeat;
    opacity:0.35;
    filter:blur(2px);
    z-index:-1;
}

.container{
    width:100%;
    max-width:1000px;
    text-align:center;
    padding:60px 20px 80px;
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    color:#6a994e;
    margin-bottom:15px;
}

.intro{
    font-size:20px;
    color:#3e6b46;
}

.contador{
    margin-top:12px;
    font-size:18px;
    color:#3e6b46;
}

/* ========= CARRUSEL ========= */

.carrusel-container{
    margin:70px 0 70px 0; /* espacio arriba y abajo */
    display:flex;
    justify-content:center;
    perspective:1400px;
}

.carrusel{
    position:relative;
    width:300px;
    height:300px;
    transform-style:preserve-3d;
    animation:girar 35s linear infinite;
}

/* IMÁGENES MÁS PEQUEÑAS */
.carrusel img{
    position:absolute;
    width:220px;
    height:280px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    left:50%;
    top:50%;
    transform-origin:center;
}

/* Animación suave */
@keyframes girar{
    from{ transform:rotateY(0deg); }
    to{ transform:rotateY(360deg); }
}

.frase{
    max-width:650px;
    margin:0 auto;
    font-size:18px;
    line-height:1.8;
    color:#2f5d3b;
}

.mensaje-extra{
    margin-top:25px;
    font-weight:600;
    font-size:18px;
    color:#2f5d3b;
}

/* Elementos flotantes */
.flotando{
    position:fixed;
    bottom:-50px;
    font-size:20px;
    animation:subir 14s linear infinite;
    opacity:0.9;
    z-index:1;
}

@keyframes subir{
    from{transform:translateY(0);}
    to{transform:translateY(-120vh);}
}

#botonMusica{
    margin-top:35px;
    padding:12px 28px;
    border-radius:25px;
    border:none;
    background:#a7d7a7;
    color:#2d4a2d;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

#botonMusica:hover{
    background:#8ecf8e;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<h1>Feliz Día de la Mujer, Mi Niña 🤍</h1>

<div class="intro">Eres calma, eres luz, eres vida.</div>

<div class="contador" id="contador"></div>

<div class="carrusel-container">
    <div class="carrusel" id="carrusel"></div>
</div>

<div class="frase">
Desde el 9 de marzo de 2024 mi corazón aprendió una nueva forma de amar.
Contigo todo se siente más libre, más bonito, más verdadero.
</div>

<div class="mensaje-extra">
Hoy celebro tu esencia, tu fuerza tranquila y la mujer increíble que eres 🤍
</div>

<button id="botonMusica">🌿 Activar música</button>

</div>

<audio id="musica" loop>
<source src="no hay problema.mp3" type="audio/mpeg">
</audio>

<script>

/* =========================================================
   CAMBIA AQUÍ LOS NOMBRES DE TUS IMÁGENES (.jpeg)
========================================================= */

const imagenes = [
"30.jpeg",
"33.jpeg",
"35.jpeg",
"42.jpeg",
"44.jpeg",
"45.jpeg",
"49.jpeg",
"50.jpeg",
"54.jpeg",
"55.jpeg"
];

/* ========================================================= */

const carrusel = document.getElementById("carrusel");
const cantidad = imagenes.length;
const angulo = 360 / cantidad;

/* Cálculo matemático para que NO se sobrepongan */
const anchoImagen = 220;
const radio = Math.round((anchoImagen / 2) / Math.tan(Math.PI / cantidad));

imagenes.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;

    img.style.transform = `
        translate(-50%, -50%)
        rotateY(${i * angulo}deg)
        translateZ(${radio}px)
    `;

    carrusel.appendChild(img);
});

/* CONTADOR */
const fechaInicio = new Date(2024, 2, 9);

function actualizarContador(){
    const ahora = new Date();
    const diferencia = ahora - fechaInicio;
    const dias = Math.floor(diferencia / (1000*60*60*24));
    document.getElementById("contador").innerHTML =
    "Han pasado " + dias + " días desde que comenzó nuestra historia 🤍";
}
actualizarContador();
setInterval(actualizarContador,1000);

/* MÚSICA */
const musica = document.getElementById("musica");
musica.volume = 0.3;

document.getElementById("botonMusica").addEventListener("click", function(){
    musica.play();
    this.style.display="none";
});

/* FLORES Y CORAZONES */
function crearElemento(){
    const elemento=document.createElement("div");
    elemento.classList.add("flotando");

    const simbolos=["🌸","🌿","🤍","🍃"];
    elemento.innerHTML=simbolos[Math.floor(Math.random()*simbolos.length)];

    elemento.style.left=Math.random()*100+"vw";
    elemento.style.fontSize=Math.random()*20+14+"px";

    document.body.appendChild(elemento);
    setTimeout(()=>{elemento.remove();},14000);
}
setInterval(crearElemento,1200);

</script>

</body>
</html>
